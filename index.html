<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyaw Htet - Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #222;
            color: white;
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 170, 255, 0.5);
            animation: slideUp 1s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Profile Image with Glow Effect */
        .profile-image img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
            to { box-shadow: 0 0 20px rgba(255, 204, 0, 1); }
        }

        /* Floating Icons with Motion */
        .icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            border-radius: 50%;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: float 3s ease-in-out infinite, rotate 4s linear infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icon.photoshop { background: linear-gradient(45deg, #001d34, #31a8ff); }
        .icon.illustrator { background: linear-gradient(45deg, #330000, #ff9a00); }
        .icon.indesign { background: linear-gradient(45deg, #4e0000, #ff3b53); }
        .icon.premiere { background: linear-gradient(45deg, #000033, #9999ff); }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #bbb;
        }

        /* Contact Icons */
        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .contact-icons img {
            width: 40px;
            height: 40px;
            transition: transform 0.3s;
        }
        .contact-icons img:hover {
            transform: scale(1.1);
        }

        /* Your Photo Section */
        .your-photo img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin-top: 20px;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="contact-icons">

            <div class="icon illustrator">Ai</div>
            <div class="icon indesign">Id</div>
            <div class="icon premiere">Pr</div>
        </div>

        <h2>🔗 Portfolio</h2>
        <p>
            <a href="https://www.behance.net/kyawhtet46" target="_blank">🌐 Behance</a> | 
            <a href="https://www.facebook.com/share/1Gb8tAs1DJ/" target="_blank">📘 Facebook</a>

            <a href="https://t.me/+959740934466"><img src="https://img.icons8.com/ios/50/00ffaa/telegram.png" alt="Telegram"></a>

    </div>

</body>
